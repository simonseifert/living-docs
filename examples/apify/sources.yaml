# sources.yaml: Apify living-reference source map
# method vocab: llms.txt | md-suffix | store-api | statuspage-json | rss | github-api | context7 | scrape
tool: Apify
last_verified: 2026-07-02

change_detector:
  type: openapi_version
  url: https://docs.apify.com/api/openapi.json
  field: info.version
  last_value: v2-2026-07-01T115402Z
  note: info.version is a timestamp; diff the string to detect any API-surface change.

sources:
  - name: docs-index
    url: https://docs.apify.com/llms.txt
    method: llms.txt
    last_fetched: 2026-07-02
    ttl_days: 30
    status: ok
    note: LLM doc index; full twin llms-full.txt (~43MB): do NOT load whole.

  - name: docs-md-twin
    url: https://docs.apify.com/api.md
    method: md-suffix
    last_fetched: 2026-07-02
    ttl_days: 30
    status: ok
    note: Every doc page has a .md twin (append .md to the page URL).

  - name: openapi-spec
    url: https://docs.apify.com/api/openapi.json
    method: scrape
    last_fetched: 2026-07-02
    ttl_days: 30
    status: ok
    note: Global API OpenAPI; info.version = change detector (v2-2026-07-01T115402Z).

  - name: per-actor-openapi
    url: https://api.apify.com/v2/acts/apify~website-content-crawler/builds/default/openapi.json
    method: scrape
    last_fetched: 2026-07-02
    ttl_days: 30
    status: ok
    note: Per-actor input/endpoint schema; substitute any username~name.

  - name: store-catalog
    url: https://api.apify.com/v2/store?limit=1&offset=0
